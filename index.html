<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: white;
        color: black;
    }

    .container {
        width: 90%;
        max-width: 1200px;
        margin: auto;
    }

    header {
        background: white;
        padding: 20px 0;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    header h2 {
        font-size: 22px;
    }

    .controls {
        margin: 30px 0;
    }

    .search {
        background: white;
        padding: 12px 20px;
        width: 100%;
        max-width: 400px;
        border-radius: 5px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    .search input {
        width: 100%;
        border: none;
        outline: none;
        font-size: 15px;
    }

    .countries {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 40px;
        margin-bottom: 40px;
    }

    .card {
        background: white;
        border-radius: 5px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
    }

    .card .info {
        padding: 20px;
    }

    .card h3 {
        margin-bottom: 10px;
    }

    .card p {
        font-size: 15px;
        margin-bottom: 5px;
    }
</style>

<body>
    <div class="container">
        <h2>Where in the world?</h2>
    </div>
    <header>
        <div class="container">
            <div class="controls">
                <input type="text" id="search" placeholder="search for a country">
            </div>
        </div>
    </header>
    <div class="container">
        <div id="countries" class="countries"></div>
        <script>
            const countriesBox = document.getElementById("countries");
            const search = document.getElementById("search");

            let data = [];

            async function loadData() {
                const res = await fetch("data.json");
                data = await res.json();
                render(data);
            }

            loadData();

            function render(list) {
                countriesBox.innerHTML = "";

                list.forEach(c => {
                    countriesBox.innerHTML += `
                <div class="card">
                    <img src="${c.flags.svg}" alt="">
                    <div class="info">
                        <h3>${c.name}</h3>
                        <p><strong>Population:</strong> ${c.population.toLocaleString()}</p>
                        <p><strong>Region:</strong> ${c.region}</p>
                        <p><strong>Capital:</strong> ${c.capital}</p>
                    </div>
                </div>
            `;
                });
            }
            search.addEventListener("input", function () {
                const value = search.value.toLowerCase();

                const filtered = data.filter(country =>
                    country.name.toLowerCase().includes(value)
                );

                render(filtered);
            });
        </script>
</body>

</html>
